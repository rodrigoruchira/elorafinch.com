<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elora Finch | Coming Soon</title>
    <meta name="description" content="Elora Finch - A luxury clothing brand. Coming soon.">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-slideshow">
        <div class="slide slide-1"></div>
        <div class="slide slide-2"></div>
        <div class="slide slide-3"></div>
        <div class="overlay"></div>
    </div>
    
    <main class="content">
        <header>
            <img src="assets/images/logo.svg" alt="Elora Finch Logo" class="brand-logo">
            <h1 class="brand-name">ELORA FINCH</h1>
        </header>

        <section class="hero">
            <h2 class="coming-soon">Coming Soon</h2>
            <p class="subtitle">Redefining modern luxury. Be the first to know when we launch.</p>
            
            <form id="notify-form" class="notify-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Enter your email address" required>
                    <button type="submit" class="submit-btn">
                        <span>Notify Me</span>
                    </button>
                </div>
                <div class="message" id="form-message"></div>
            </form>
        </section>

        <footer>
            <div class="socials">
                <a href="#" class="social-link" aria-label="Instagram">IG</a>
                <a href="#" class="social-link" aria-label="Twitter">TW</a>
                <a href="#" class="social-link" aria-label="TikTok">TK</a>
            </div>
            <p class="copyright">&copy; <span id="year"></span> Elora Finch. All rights reserved.</p>
        </footer>
    </main>

    <script src="assets/js/script.js"></script>
</body>
</html>
